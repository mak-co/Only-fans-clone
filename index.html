<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="output.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

  <title>Clone</title>
</head>

<body class="bg-black text-white h-screen">
  <!-- entire webpage -->

  <div class="flex flex-row  h-full">
    <!-- Sidebar -->
    <div class="w-72 bg-zinc-900 p-4 flex flex-col justify-between">
      <!-- Top Menu -->
      <div>

        <div class="img flex items-center gap-3 p-3 ">
          <img src="./oflogo.png" alt="OnlyFans" class="w-2/3 h-auto ">
        </div>

        <ul>
          <li class="group flex items-center rounded-xl gap-3 hover:bg-zinc-800 p-3 cursor-pointer">
            <span class="material-symbols-outlined group-hover:text-cyan-500">
              home
            </span>

            <span> Home </span>
          </li>
          <li class="group flex items-center gap-3 hover:bg-zinc-800 p-3 rounded-xl cursor-pointer">
            <span class="material-symbols-outlined group-hover:text-cyan-500"> notifications </span>
            <span>Notification</span>
          </li>

          <li class="group flex items-center gap-3  hover:bg-zinc-800 p-3 rounded-xl cursor-pointer">
            <span class="material-symbols-outlined group-hover:text-cyan-500"> mail </span>
            <span>Message</span>
          </li>



          <li class="group flex items-center gap-3  hover:bg-zinc-800 p-3 rounded-xl cursor-pointer">
            <span class="material-symbols-outlined group-hover:text-cyan-500"> bookmark </span>
            <span>bookmark</span>
          </li>

          <li class="group flex items-center gap-3  hover:bg-zinc-800 p-3 rounded-xl cursor-pointer">
            <span class="material-symbols-outlined group-hover:text-cyan-500"> List </span>
            <span>List</span>
          </li>

          <li class="group flex items-center gap-3  hover:bg-zinc-800 p-3 rounded-xl cursor-pointer">
            <span class="material-symbols-outlined group-hover:text-cyan-500"> Subscriptions </span>
            <span>Subscriptions</span>
          </li>





        </ul>
      </div>

      <!-- Bottom Menu -->






      <div>
        <ul class="border-t border-zinc-700 pt-4">
          <li class="group flex items-center gap-3  hover:bg-zinc-800 p-3 rounded-xl cursor-pointer">
            <span class="material-symbols-outlined group-hover:text-cyan-500"> Person </span>
            <span>Profile</span>



          <li class="group flex items-center gap-3  hover:bg-zinc-800 p-3 rounded-xl cursor-pointer">

            <span class="material-symbols-outlined group-hover:text-cyan-500"> account_Circle </span>
            <span>Notification</span>
          </li>



          <li class="flex items-center gap-3 hover:bg-zinc-800 p-3 rounded-xl cursor-pointer">
            <span>⚙️</span>
            <span>Setting</span>
          </li>
        </ul>
      </div>
    </div>

    <!-- right main section -->
    <div class="flex-1 bg-zinc-950">
      <nav class="flex  items-center justify-between px-4 md:px-6 py-4 border-b border-zinc-800 bg-black text-white ">

        <!-- Search Section -->
        <div class="flex-1 max-w-xl justify-end">

          <form  class="flex   items-center bg-zinc-900 rounded-xl px-4 py-3">
            <span class="material-symbols-outlined text-gray-400 mr-3">Search</span>


            <input 
               type="text"
               placeholder="Search..."
               class="bg-transparent w-full outline-none text-sm placeholder:text-gray-500">
            
          </form>
        </div>


        <!-- Icons -->
        <div class="flex items-center  gap-3">
          <a href="#" class="hover:text-cyan-500 transition">
            <span class="material-symbols-outlined">
              notifications
            </span>
          </a>
          <a href="#"  class="hover:text-cyan-500 transition hidden sm:block">
            <span class="material-symbols-outlined">
              Inbox
            </span>
          </a>
          <a href="#" class="hover:text-cyan-500 transition hidden md:block">
            <span class="material-symbols-outlined">
              Chat
            </span>
          </a>
          <a href="#" class="hover:text-cyan-500 transition ">
            <span class="material-symbols-outlined">
              account_Circle
            </span>
            
          </a>
          
        </div>

      </nav>

    </div>
  </div>
</body>

</html>
